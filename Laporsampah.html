<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LaporSampah.id</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }
    header {
      background: #2e7d32;
      color: white;
      padding: 15px;
      text-align: center;
    }
    nav {
      background: #1b5e20;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }
    .container {
      padding: 20px;
    }
    form {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #2e7d32;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }
    th {
      background: #2e7d32;
      color: white;
    }
    .status-menunggu {
      color: orange;
      font-weight: bold;
    }
    .status-selesai {
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <h1>LaporSampah.id</h1>
  <p>Laporkan Sampah Liar di Sekitar Anda</p>
</header>

<nav>
  <a href="#form">Buat Laporan</a>
  <a href="#data">Data Laporan</a>
</nav>

<div class="container">

  <section id="form">
    <h2>Buat Laporan</h2>
    <form>
      <input type="text" placeholder="Nama Pelapor" required>
      <textarea placeholder="Deskripsi Lokasi Sampah" required></textarea>
      <input type="file">
      <button type="submit">Kirim Laporan</button>
    </form>
  </section>

  <section id="data">
    <h2>Data Laporan</h2>
    <table>
      <tr>
        <th>No</th>
        <th>Nama</th>
        <th>Deskripsi</th>
        <th>Foto</th>
        <th>Status</th>
        <th>Aksi</th>
      </tr>
      <tr>
        <td>1</td>
        <td>Trisha</td>
        <td>Sampah di pinggir jalan</td>
        <td><img src="https://via.placeholder.com/80" width="80"></td>
        <td class="status-menunggu">Menunggu</td>
        <td>
          <button>Dibersihkan</button>
          <button>Hapus</button>
        </td>
      </tr>
      <tr>
        <td>2</td>
        <td>Budi</td>
        <td>Tumpukan sampah di sungai</td>
        <td><img src="https://via.placeholder.com/80" width="80"></td>
        <td class="status-selesai">Dibersihkan</td>
        <td>
          <button>Menunggu</button>
          <button>Hapus</button>
        </td>
      </tr>
    </table>
  </section>

</div>

</body>
</html>
